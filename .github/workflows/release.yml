name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libwebkitgtk-6.0-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libwebkitgtk-6.0-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: jmux-linux-amd64
          path: |
            target/release/jmux-app
            target/release/jmux

  build-daemon:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: daemon/remote/go.mod

      - name: Cross-compile jmuxd-remote for all platforms
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          LDFLAGS="-X main.version=${VERSION}"
          cd daemon/remote
          for TARGET in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            GOOS="${TARGET%-*}" GOARCH="${TARGET#*-}" CGO_ENABLED=0 \
              go build -ldflags "${LDFLAGS}" -o "../../artifacts/jmuxd-remote-${TARGET}" \
              ./cmd/jmuxd-remote
          done
          cd ../../artifacts
          sha256sum jmuxd-remote-* > checksums-sha256.txt

      - uses: actions/upload-artifact@v4
        with:
          name: jmuxd-remote-binaries
          path: artifacts/

  release:
    needs: [build, build-daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: jmux-linux-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: jmuxd-remote-binaries
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x artifacts/jmux-app artifacts/jmux artifacts/jmuxd-remote-*
          # Upload to existing release if it was created manually, otherwise create new
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" artifacts/jmux-app artifacts/jmux \
              artifacts/jmuxd-remote-* artifacts/checksums-sha256.txt --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "See [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md) for details." \
              artifacts/jmux-app \
              artifacts/jmux \
              artifacts/jmuxd-remote-* \
              artifacts/checksums-sha256.txt
          fi

  aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .ghostty-commit

      - name: Extract version and ghostty commit from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          raw="${REF_NAME#v}"
          aur_ver="${raw//-/.}"
          echo "version=$raw" >> "$GITHUB_OUTPUT"
          echo "aur_version=$aur_ver" >> "$GITHUB_OUTPUT"
          echo "ghostty_commit=$(cat .ghostty-commit | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: sha256
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          sha=$(curl -sL "https://github.com/${REPO}/archive/${TAG}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/jmux.git aur-jmux

      - name: Update PKGBUILD and .SRCINFO
        env:
          VERSION: ${{ steps.version.outputs.version }}
          AUR_VERSION: ${{ steps.version.outputs.aur_version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
          GHOSTTY_COMMIT: ${{ steps.version.outputs.ghostty_commit }}
        run: |
          cd aur-jmux
          sed -i "s/^pkgver=.*/pkgver=${AUR_VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          sed -i "s/^_ghostty_commit=.*/_ghostty_commit=${GHOSTTY_COMMIT}/" PKGBUILD

          # Generate .SRCINFO by sourcing PKGBUILD variables.
          # This stays in sync automatically when PKGBUILD fields change.
          eval "$(grep -E '^(pkgname|pkgver|pkgrel|pkgdesc|url|license|_tagver)=' PKGBUILD | head -20)"
          eval "$(grep -E '^(arch|depends|makedepends|provides|conflicts)=' PKGBUILD | head -20)"
          _tagver="${pkgver//.alpha/-alpha}"
          {
            echo "pkgbase = ${pkgname}"
            echo "	pkgdesc = ${pkgdesc}"
            echo "	pkgver = ${pkgver}"
            echo "	pkgrel = ${pkgrel}"
            echo "	url = ${url}"
            for v in "${arch[@]}"; do echo "	arch = $v"; done
            for v in "${license[@]}"; do echo "	license = $v"; done
            for v in "${makedepends[@]}"; do echo "	makedepends = $v"; done
            for v in "${depends[@]}"; do echo "	depends = $v"; done
            for v in "${provides[@]}"; do echo "	provides = $v"; done
            for v in "${conflicts[@]}"; do echo "	conflicts = $v"; done
            echo "	source = ${pkgname}-${_tagver}.tar.gz::${url}/archive/v${_tagver}.tar.gz"
            echo "	sha256sums = ${SHA256}"
            echo ""
            echo "pkgname = ${pkgname}"
          } > .SRCINFO

      - name: Push to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd aur-jmux
          git config user.name "Douglas Soares de Andrade"
          git config user.email "contato@douglasandrade.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${VERSION}"
          git push
